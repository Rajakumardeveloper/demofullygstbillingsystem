<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGAR JEWELLERS | Order Bill</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #eef2f5;
            font-family: 'Arial', 'Helvetica', 'Segoe UI', sans-serif;
            padding: 15px;
        }
        .top-bar {
            background: #1e466e;
            padding: 12px 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            color: white;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 5px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-gold { background: #c2a15b; color: #1e466e; }
        .btn-outline { background: transparent; border: 1px solid #c2a15b; color: #c2a15b; }
        .btn-green { background: #28a745; color: white; }
        .invoice-container {
            max-width: 1300px;
            width: 100%;
            background: white;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            margin: 0 auto;
        }
        .invoice {
            padding: 20px 25px 25px 25px;
            background: white;
        }
        .vendor-header {
            border: 1px solid #000;
            padding: 12px 15px;
            margin-bottom: 18px;
            background: #fefefe;
        }
        .company-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .company-icon {
            width: 33px;
            height: 33px;
            border-radius: 8px;
            background: #1e466e;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .company-icon .no-image {
            font-size: 16px;
            color: white;
            font-weight: bold;
        }
        .vendor-name {
            font-size: 22px;
            font-weight: 800;
            color: #1e466e;
        }
        .vendor-details {
            font-size: 10px;
            line-height: 1.4;
            color: #2c3e50;
            margin-top: 5px;
            font-weight: 600;
        }
        .contact-row {
            margin-top: 6px;
            font-size: 11px;
            font-weight: 700;
            color: #1e466e;
        }
        .row-flex {
            display: flex;
            justify-content: flex-end;
            margin-top: 8px;
            font-weight: 600;
        }
        .invoice-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-bottom: 18px;
        }
        .meta-box {
            border: 1px solid #000;
            padding: 10px 12px;
            background: white;
        }
        .meta-title {
            font-weight: 800;
            font-size: 12px;
            background: #f0f2f5;
            padding: 4px 8px;
            margin: -10px -12px 10px -12px;
            border-bottom: 1px solid #000;
        }
        .meta-row {
            display: flex;
            margin-bottom: 6px;
            font-size: 11px;
            align-items: center;
            flex-wrap: wrap;
            gap: 5px;
        }
        .meta-label {
            width: 100px;
            font-weight: 700;
            font-size: 10px;
        }
        .meta-value {
            flex: 1;
            min-width: 120px;
        }
        .meta-value input, .meta-value textarea {
            width: 100%;
            padding: 4px 6px;
            border: 1px solid #aaa;
            font-size: 10px;
        }
        .signature-footer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin: 20px 0 15px;
            border-top: 1px solid #000;
            padding-top: 15px;
        }
        .sign-box {
            border: 1px solid #000;
            padding: 12px;
            min-height: 70px;
            text-align: center;
            font-size: 10px;
            font-weight: 700;
        }
        .action-bar {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 18px;
            padding-top: 12px;
            border-top: 1px solid #ddd;
        }
        @media print {
            .top-bar, .action-bar, .btn {
                display: none !important;
            }
            .invoice-container {
                box-shadow: none;
                margin: 0;
                width: 100%;
            }
            .invoice {
                padding: 0;
                margin: 0;
            }
            input, textarea {
                border: none !important;
                background: transparent !important;
                padding: 0 !important;
                font-size: 9px !important;
                color: black !important;
                font-weight: 600 !important;
            }
            .vendor-header, .meta-box, .sign-box {
                border: 1px solid black !important;
            }
            @page { margin: 0; size: A4; }
            body { margin: 0; padding: 0; background: white; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <h2>SAGAR JEWELLERS | Order Bill</h2>
    <div>
        <button class="btn btn-outline" onclick="window.location.href='index.html'">← Dashboard</button>
        <button class="btn btn-gold" id="printBtn">🖨️ Print</button>
        <button class="btn btn-green" id="saveBtn">💾 Save to Pendrive</button>
    </div>
</div>

<div class="invoice-container">
    <div class="invoice" id="orderInvoice">
        <!-- Dynamic content -->
    </div>
    <div class="action-bar" style="padding: 16px 24px; background: #f8f9fa; border-top: 1px solid #ddd; display: flex; justify-content: flex-end; gap: 12px;">
        <button class="btn btn-outline" onclick="window.location.href='index.html'">Cancel</button>
        <button class="btn btn-gold" id="printBtn2">🖨️ Print</button>
        <button class="btn btn-green" id="saveBtn2">💾 Save to Pendrive</button>
    </div>
</div>

<script>
    // Disable right-click
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        return false;
    });

    let currentFileHandle = null;
    let appData = { invoices: [], customers: {}, goldRates: {}, orders: [] };
    let currentEditingId = null;

    const DB_NAME = 'JPJewellersFileHandleDB';
    const STORE_NAME = 'fileHandleStore';
    const KEY_NAME = 'handle';

    async function getStoredFileHandle() {
        return new Promise((resolve) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = () => { const db = request.result; if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME); };
            request.onsuccess = () => {
                const db = request.result;
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const getReq = store.get(KEY_NAME);
                getReq.onsuccess = () => resolve(getReq.result || null);
                getReq.onerror = () => resolve(null);
            };
            request.onerror = () => resolve(null);
        });
    }

    async function ensureWritePermission(handle) {
        if (await handle.queryPermission({ mode: 'readwrite' }) === 'granted') return true;
        const perm = await handle.requestPermission({ mode: 'readwrite' });
        return perm === 'granted';
    }

    async function loadDataFromHandle(handle) {
        try {
            const file = await handle.getFile();
            const text = await file.text();
            if (text.trim()) {
                const parsed = JSON.parse(text);
                appData.invoices = parsed.invoices || [];
                appData.customers = parsed.customers || {};
                appData.goldRates = parsed.goldRates || {};
                appData.orders = parsed.orders || [];
            } else {
                appData = { invoices: [], customers: {}, goldRates: {}, orders: [] };
            }
            currentFileHandle = handle;
            return true;
        } catch(e) { console.error(e); return false; }
    }

    async function writeToFile() {
        if (!currentFileHandle) { alert("No file selected."); return false; }
        const hasPerm = await ensureWritePermission(currentFileHandle);
        if (!hasPerm) { alert("Permission lost. Please re-select file."); return false; }
        try {
            const writable = await currentFileHandle.createWritable();
            await writable.write(JSON.stringify({ invoices: appData.invoices, customers: appData.customers, goldRates: appData.goldRates, orders: appData.orders }, null, 2));
            await writable.close();
            return true;
        } catch(e) { alert("Error writing: " + e.message); return false; }
    }

    function setTodayDate() {
        const d = new Date();
        return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
    }

    function buildOrderHTML(order) {
        const today = setTodayDate();
        const dateValue = order ? order.date : today;
        const custName = order ? order.custName : '';
        const mobile = order ? order.mobile : '';
        const address = order ? order.address : '';
        const aadhar = order ? order.aadhar : '';
        const pan = order ? order.pan : '';
        const advance = order ? order.advance : 0;
        const description = order ? order.description : '';

        const safe = (str) => (str || '').replace(/"/g, '&quot;');

        return `
            <div class="vendor-header">
                <div class="company-header">
                    <div class="company-icon"><div class="no-image">SJ</div></div>
                    <div class="vendor-name">SAGAR JEWELLERS - Gold & Silver Merchants</div>
                </div>
                <div class="vendor-details">
                    <strong>Sold By:</strong> SAGAR JEWELLERS<br>
                    <strong>Address:</strong> Cinema Road, Near Central Bank, Ballia
                </div>
                <div class="contact-row">
                    <strong>Contact:</strong> 7485038505 , 9102131685
                </div>
                <div class="row-flex">
                    <span><strong>ORDER DATE:</strong> <span id="orderDateDisplay">${dateValue}</span></span>
                </div>
            </div>

            <div class="invoice-meta">
                <div class="meta-box">
                    <div class="meta-title">Customer Details</div>
                    <div class="meta-row"><div class="meta-label">Customer Name *</div><div class="meta-value"><input type="text" id="modalCustName" value="${safe(custName)}" placeholder="Full Name"></div></div>
                    <div class="meta-row"><div class="meta-label">Mobile Number *</div><div class="meta-value"><input type="tel" id="modalMobile" maxlength="10" value="${safe(mobile)}" placeholder="10 digit mobile"></div></div>
                    <div class="meta-row"><div class="meta-label">Address</div><div class="meta-value"><textarea id="modalAddress" rows="2" placeholder="Street, City, District">${safe(address)}</textarea></div></div>
                    <div class="meta-row"><div class="meta-label">Aadhar Number</div><div class="meta-value"><input type="text" id="modalAadhar" value="${safe(aadhar)}" placeholder="XXXX-XXXX-XXXX"></div></div>
                    <div class="meta-row"><div class="meta-label">PAN Number</div><div class="meta-value"><input type="text" id="modalPan" value="${safe(pan)}" placeholder="ABCDE1234F"></div></div>
                </div>
                <div class="meta-box">
                    <div class="meta-title">Order Details</div>
                    <div class="meta-row"><div class="meta-label">Order Date</div><div class="meta-value"><input type="text" id="modalOrderDate" value="${dateValue}" readonly style="background:#f0f0f0;"></div></div>
                    <div class="meta-row"><div class="meta-label">Advance Payment (₹)</div><div class="meta-value"><input type="number" id="modalAdvance" value="${advance}" step="100"></div></div>
                    <div class="meta-row"><div class="meta-label">Description</div><div class="meta-value"><textarea id="modalDescription" rows="3" placeholder="What item to make? Specifications...">${safe(description)}</textarea></div></div>
                </div>
            </div>

            <div class="signature-footer">
                <div class="sign-box">Customer Signature<br><br>_________________________</div>
                <div class="sign-box">For SAGAR JEWELLERS<br><br>_________________________<br>Authorised Signatory</div>
            </div>
            <div style="font-size:7px; text-align:center; border-top:1px solid #ccc; padding-top:5px;">This is a computer generated order bill</div>
        `;
    }

    function renderOrderForm(order) {
        const container = document.getElementById('orderInvoice');
        container.innerHTML = buildOrderHTML(order);
    }

    async function saveOrder() {
        const custName = document.getElementById('modalCustName').value.trim();
        const mobile = document.getElementById('modalMobile').value.trim();
        if (!custName || !mobile) { alert("Customer Name and Mobile Number are required"); return; }
        const order = {
            id: currentEditingId || ('ord-'+Date.now()),
            date: document.getElementById('modalOrderDate').value,
            custName,
            mobile,
            address: document.getElementById('modalAddress').value,
            aadhar: document.getElementById('modalAadhar').value.trim(),
            pan: document.getElementById('modalPan').value.trim().toUpperCase(),
            advance: parseFloat(document.getElementById('modalAdvance').value) || 0,
            description: document.getElementById('modalDescription').value
        };
        if (currentEditingId) {
            const idx = appData.orders.findIndex(o => o.id === currentEditingId);
            if (idx !== -1) appData.orders[idx] = order;
            else appData.orders.push(order);
        } else {
            appData.orders.push(order);
            currentEditingId = order.id;
        }
        await writeToFile();
        alert("Order saved to pendrive!");
    }

    async function loadOrderForEdit(id) {
        const order = appData.orders.find(o => o.id === id);
        if (!order) return false;
        currentEditingId = id;
        renderOrderForm(order);
        return true;
    }

    async function init() {
        const handle = await getStoredFileHandle();
        if (!handle) { alert("No pendrive file selected. Please go to Dashboard first."); window.location.href='index.html'; return; }
        const hasPerm = await ensureWritePermission(handle);
        if (!hasPerm) { alert("Permission lost. Please go to Dashboard and re-select the file."); window.location.href='index.html'; return; }
        await loadDataFromHandle(handle);
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if (id) {
            await loadOrderForEdit(id);
        } else {
            renderOrderForm(null);
        }
        document.getElementById('saveBtn').onclick = saveOrder;
        document.getElementById('saveBtn2').onclick = saveOrder;
        document.getElementById('printBtn').onclick = () => window.print();
        document.getElementById('printBtn2').onclick = () => window.print();
    }

    init();
</script>
</body>
</html>
